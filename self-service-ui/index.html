<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Self-Service Environment Request</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>Self-Service Environment Request</h1>
            <p>Форма создаёт GitOps request из approved catalog. Ресурсы создаёт Argo CD после merge.</p>
          </div>
          <div class="status-pill">GitOps only</div>
        </header>

        <section class="panel form-panel">
          <div class="section-title">
            <h2>Параметры запроса</h2>
            <span id="profileSummary">app-with-vm</span>
          </div>

          <div class="grid two">
            <label>
              <span>Owner</span>
              <input id="owner" value="alice" autocomplete="off" />
            </label>
            <label>
              <span>Team</span>
              <input id="team" value="payments" autocomplete="off" />
            </label>
            <label>
              <span>Environment name</span>
              <input id="envName" value="dev-alice-001" autocomplete="off" />
            </label>
            <label>
              <span>TTL</span>
              <select id="ttl">
                <option value="2h">2h</option>
                <option value="4h">4h</option>
                <option value="8h" selected>8h</option>
                <option value="24h">24h</option>
              </select>
            </label>
          </div>

          <div class="profiles" id="profiles"></div>

          <div class="grid two">
            <label>
              <span>Application image</span>
              <select id="appImage"></select>
            </label>
            <label>
              <span>VM image</span>
              <select id="vmImage"></select>
            </label>
          </div>

          <div class="toggles">
            <label class="check">
              <input id="exposeIngress" type="checkbox" checked />
              <span>Expose Ingress</span>
            </label>
            <label class="check">
              <input id="sshToVm" type="checkbox" />
              <span>Request SSH to VM</span>
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>Что будет создано</h2>
            <span id="resourceEstimate">-</span>
          </div>
          <div class="cards" id="resourceCards"></div>
        </section>
      </section>

      <aside class="output">
        <div class="panel sticky">
          <div class="section-title">
            <h2>EnvironmentRequest</h2>
            <button id="copyYaml" type="button">Copy YAML</button>
          </div>
          <pre id="yamlOutput"></pre>

          <div class="section-title commands-title">
            <h2>Git commands</h2>
            <button id="copyCommands" type="button">Copy</button>
          </div>
          <pre id="commandsOutput"></pre>
        </div>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
