apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-prod
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: demo-platform
spec:
  replicas: 4
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        app.kubernetes.io/name: demo-app
        app.kubernetes.io/part-of: demo-platform
    spec:
      serviceAccountName: demo-app
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-prod
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app
  namespace: demo-prod
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  rules:
    - host: demo-app.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  name: http
