apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-alice-koroleva-demo-c3aa-quota
  namespace: dev-alice-koroleva-demo-c3aa
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    pods: "12"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-alice-koroleva-demo-c3aa-defaults
  namespace: dev-alice-koroleva-demo-c3aa
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 200m
        memory: 256Mi
