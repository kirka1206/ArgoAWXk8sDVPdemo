apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: dev-alice-001
  labels:
    app: demo-app
    demo.platform/request: dev-alice-001
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        demo.platform/request: dev-alice-001
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: dev-alice-001
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app
  namespace: dev-alice-001
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  rules:
    - host: dev-alice-001.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  name: http
