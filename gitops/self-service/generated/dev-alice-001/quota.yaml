apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-alice-001-quota
  namespace: dev-alice-001
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "12"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-alice-001-defaults
  namespace: dev-alice-001
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
