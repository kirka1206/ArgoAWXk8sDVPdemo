apiVersion: demo.platform/v1
kind: EnvironmentProfile
metadata:
  name: app-only
spec:
  description: "Namespace, RBAC, quota, demo app and ingress. No VM."
  ttlMax: 8h
  quota:
    requestsCpu: 500m
    requestsMemory: 512Mi
    limitsCpu: "1"
    limitsMemory: 1Gi
    pods: "8"
  workload:
    app: true
    ingress: true
    vm: false
    awxPostConfig: false
  allowedImages:
    - nginx:1.27
    - nginx:1.26
