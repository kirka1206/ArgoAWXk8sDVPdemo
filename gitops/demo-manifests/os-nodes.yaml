apiVersion: v1
kind: Secret
metadata:
  name: os-node-ssh
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  username: ansible
  password: ansible123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: os-node-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  start.sh: |
    #!/bin/sh
    set -eu
    apk add --no-cache openssh python3 sudo curl >/tmp/bootstrap.log 2>&1
    adduser -D -s /bin/sh ansible || true
    echo "ansible:ansible123" | chpasswd
    echo "ansible ALL=(ALL) NOPASSWD:ALL" >/etc/sudoers.d/ansible
    ssh-keygen -A
    exec /usr/sbin/sshd -D -e
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ol-node-1
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: ol-node-1
    app.kubernetes.io/part-of: ansible-argo-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ol-node-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ol-node-1
        app.kubernetes.io/part-of: ansible-argo-demo
    spec:
      containers:
        - name: os
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/bootstrap/start.sh"]
          ports:
            - name: ssh
              containerPort: 22
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
      volumes:
        - name: bootstrap
          configMap:
            name: os-node-bootstrap
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: ol-node-1
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: ol-node-1
    app.kubernetes.io/part-of: ansible-argo-demo
spec:
  selector:
    app.kubernetes.io/name: ol-node-1
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
---
