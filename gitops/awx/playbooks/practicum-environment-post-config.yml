- name: Register the requested practicum VM
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add requested VM to the runtime inventory
      ansible.builtin.add_host:
        name: "{{ target_name }}"
        groups: practicum_target
        ansible_host: "{{ target_host }}"
        ansible_user: ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Configure a practicum self-service VM
  hosts: practicum_target
  gather_facts: true
  become: true
  tasks:
    - name: Validate requested PostgreSQL package on Alpine
      ansible.builtin.command:
        argv:
          - apk
          - search
          - -x
          - "{{ postgresql_package }}"
      register: postgresql_package_search
      changed_when: false
      failed_when: postgresql_package not in postgresql_package_search.stdout
      when:
        - ansible_pkg_mgr == "apk"
        - install_postgresql | default(false) | bool

    - name: Install practicum base packages on Alpine
      ansible.builtin.command: >-
        apk add --no-cache qemu-guest-agent curl jq
        {{ postgresql_package if install_postgresql | default(false) | bool else '' }}
      register: apk_result
      changed_when: "'OK:' in apk_result.stdout or 'OK:' in apk_result.stderr"
      when: ansible_pkg_mgr == "apk"

    - name: Enable qemu guest agent on OpenRC
      ansible.builtin.service:
        name: qemu-guest-agent
        state: started
        enabled: true
      when: ansible_service_mgr == "openrc"

    - name: Write practicum management marker
      ansible.builtin.copy:
        dest: /etc/practicum-managed
        owner: root
        group: root
        mode: "0644"
        content: |
          managed_by=AWX
          environment={{ inventory_hostname }}
          description=4 practicum

    - name: Validate practicum marker
      ansible.builtin.command: cat /etc/practicum-managed
      register: practicum_marker
      changed_when: false

    - name: Print practicum validation result
      ansible.builtin.debug:
        var: practicum_marker.stdout_lines
