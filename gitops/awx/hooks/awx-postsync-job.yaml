apiVersion: batch/v1
kind: Job
metadata:
  name: awx-postsync-launch
  namespace: demo-prod
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "4"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: launch-awx-job
          image: curlimages/curl:8.11.1
          env:
            - name: AWX_URL
              valueFrom:
                secretKeyRef:
                  name: awx-api-token
                  key: url
            - name: AWX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: awx-api-token
                  key: token
            - name: AWX_JOB_TEMPLATE_ID
              value: "replace-with-template-id"
          command:
            - /bin/sh
            - -ec
            - |
              curl -fsS -X POST \
                -H "Authorization: Bearer ${AWX_TOKEN}" \
                -H "Content-Type: application/json" \
                "${AWX_URL}/api/v2/job_templates/${AWX_JOB_TEMPLATE_ID}/launch/"
